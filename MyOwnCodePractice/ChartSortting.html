<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Chart Sorting</title>
</head>
<body>
	<center>
		<div class = "header" id = "header_part">
			<h1><strong><em>Chart Sorting</em></strong></h1>
		</div>
		<hr size = 3>
		<a href="MyPage.html">Back to homepage</a>
	</center>
	<div class = "body_form" id = "form_input">
	<form class="body_form">
		<div class = "body_bar_value" id = "bar_value">
			<label>Number of bars:</label>
			<input type="text" name = "bars" value = "">
			<br>
			<label>Random bars</label>
			<input type="checkbox" name="rnd">
		</div>
		<!--If random is checked we need to pass a true value to the generator of bars-->
		<div class = "body_chocie" id = "choice">
			Select sorting algorithm:
			<ol>
				<li>Bubble sort<input type = "checkbox" name = "bubble"></li>
				<li>Merge sort<input type = "checkbox" name = "merge"></li>
				<li>Selection sort<input type = "checkbox" name = "selection"></li>
				<li>Insertion sort<input type = "checkbox" name = "insertion"></li>
			</ol>
		</div>
		<input type="submit" >
	</form>
	</div>
</body>
</html>
